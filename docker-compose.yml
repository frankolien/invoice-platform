services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
      POSTGRES_DB: invoice_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice -d invoice_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      APP_ENV: development
      DATABASE_URL: postgres://invoice:invoice@postgres:5432/invoice_platform
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      JWT_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      RUST_LOG: info,sqlx=warn
    ports:
      - "3000:3000"

volumes:
  pgdata:
